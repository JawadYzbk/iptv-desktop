name: Release Candidate
on:
  push:
    branches:
      - rc

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        build:
          - name: "RCLinux"
            platform: "linux/amd64"
            os: "ubuntu-latest"
          - name: "RCWindows"
            platform: "windows/amd64"
            os: "windows-latest"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Setup GO
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.23.5"

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependency & NFPM
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev flatpak flatpak-builder jq
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Linux
        if: startsWith(matrix.os, 'ubuntu')
        run: ./build/linux/build.sh

      - name: Install Windows Dependency
        if: startsWith(matrix.os, 'windows')
        run: choco install nsis -y

      - name: Build Windows
        if: startsWith(matrix.os, 'windows')
        run: wails build -nsis

      - name: Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            build/linux/installer
            build/bin

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Version from wails.json
        run: echo "VERSION=$(jq -r '.info.productVersion' wails.json)" >> $GITHUB_ENV

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: v${{ env.VERSION }}-rc
          name: v${{ env.VERSION }}-rc
          files: artifacts
